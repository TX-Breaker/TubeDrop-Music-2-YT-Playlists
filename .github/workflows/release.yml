name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test tests/TubeDrop.Tests --configuration Release

      - name: Publish single-file (self-contained)
        run: >
          dotnet publish src/TubeDrop.App/TubeDrop.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.version }}
          --output publish

      # --- Code signing placeholder ---------------------------------------
      # Binaries are UNSIGNED for now (SmartScreen will warn on first run).
      # To sign, add the certificate as a secret and enable this step:
      #
      # - name: Sign
      #   run: signtool sign /f cert.pfx /p ${{ secrets.CERT_PASSWORD }}
      #        /tr http://timestamp.digicert.com /td sha256 /fd sha256
      #        publish/TubeDrop.exe
      # --------------------------------------------------------------------

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Package with Velopack
        run: >
          vpk pack
          --packId TubeDrop
          --packVersion ${{ steps.version.outputs.version }}
          --packDir publish
          --mainExe TubeDrop.exe
          --outputDir velopack_out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            velopack_out/*.exe
            velopack_out/*.nupkg
            velopack_out/RELEASES
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
